name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v0.1.1"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      APPLE_SIGNING_CERT_BASE64: ${{ secrets.APPLE_SIGNING_CERT_BASE64 }}
      APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
      APPLE_DEVELOPER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
      APPLE_NOTARY_API_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_BASE64 }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.tag }}" >> "${GITHUB_OUTPUT}"
          else
            echo "name=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Ensure dispatch tag exists
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git fetch --tags
          if git rev-parse "${{ steps.tag.outputs.name }}" >/dev/null 2>&1; then
            echo "Tag already exists locally."
          else
            git tag "${{ steps.tag.outputs.name }}" "${GITHUB_SHA}"
            git push origin "${{ steps.tag.outputs.name }}"
          fi

      - name: Build app bundle
        shell: bash
        run: chmod +x ./Scripts/build_app.sh ./Scripts/package_release.sh ./Scripts/release_tag.sh ./Scripts/run_app_bundle.sh

      - name: Verify Apple release secrets
        shell: bash
        run: |
          required_vars=(
            APPLE_SIGNING_CERT_BASE64
            APPLE_SIGNING_CERT_PASSWORD
            APPLE_DEVELOPER_IDENTITY
            APPLE_NOTARY_API_KEY_BASE64
            APPLE_NOTARY_KEY_ID
            APPLE_NOTARY_ISSUER_ID
          )

          for name in "${required_vars[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required secret: ${name}" >&2
              exit 1
            fi
          done

      - name: Import Developer ID certificate
        shell: bash
        run: |
          echo "${{ secrets.APPLE_SIGNING_CERT_BASE64 }}" | base64 --decode > "${RUNNER_TEMP}/signing-cert.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${RUNNER_TEMP}/signing-cert.p12" \
            -k "${KEYCHAIN_PATH}" \
            -P "${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -d user -s "${KEYCHAIN_PATH}"
          security find-identity -v "${KEYCHAIN_PATH}"

      - name: Prepare notary API key
        shell: bash
        run: |
          KEY_PATH="${RUNNER_TEMP}/AuthKey_${{ secrets.APPLE_NOTARY_KEY_ID }}.p8"
          echo "${{ secrets.APPLE_NOTARY_API_KEY_BASE64 }}" | base64 --decode > "${KEY_PATH}"
          echo "APPLE_NOTARY_KEY_PATH=${KEY_PATH}" >> "${GITHUB_ENV}"

      - name: Package notarized release
        shell: bash
        env:
          CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          ENABLE_NOTARIZATION: "1"
        run: ./Scripts/package_release.sh "${{ steps.tag.outputs.name }}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ARCH="$(uname -m)"
          ZIP_PATH="ReleaseAssets/UtilizationDetail-${{ steps.tag.outputs.name }}-macos-${ARCH}.zip"
          SHA_PATH="${ZIP_PATH}.sha256"
          NOTES_FILE="$(mktemp)"
          cat > "${NOTES_FILE}" <<EOF
          Automated release for ${{ steps.tag.outputs.name }}.

          Included assets:
          - UtilizationDetail-${{ steps.tag.outputs.name }}-macos-${ARCH}.zip
          - UtilizationDetail-${{ steps.tag.outputs.name }}-macos-${ARCH}.zip.sha256

          Notes:
          - Signed with Developer ID.
          - Notarized and stapled.
          - Requires macOS 14 or later.
          EOF

          if gh release view "${{ steps.tag.outputs.name }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.tag.outputs.name }}" \
              "${ZIP_PATH}" \
              "${SHA_PATH}" \
              --clobber
          else
            gh release create "${{ steps.tag.outputs.name }}" \
              "${ZIP_PATH}" \
              "${SHA_PATH}" \
              --title "${{ steps.tag.outputs.name }}" \
              --notes-file "${NOTES_FILE}"
          fi
